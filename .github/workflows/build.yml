name: Build APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/my-key.jks

      - name: Create local.properties
        run: |
          echo "storeFile=my-key.jks" >> android/local.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: PerfMTK Manager ${{ github.ref_name }}
          body: |
            - Added Russian language (Initial translation. May be rough)
            - Full Russification
            - If you have any corrections or want to help with the translation into Russian and other languages, contact: zynqff@gmail.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
