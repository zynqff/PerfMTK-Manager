name: Build APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: PerfMTK Manager ${{ github.ref_name }}
          body: |
            ## PerfMTK Manager ${{ github.ref_name }}
            
            ### Что нового
            - Добавлен русский язык
            
            ### Скачать
            Скачай `app-release.apk` ниже и установи на устройство.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
